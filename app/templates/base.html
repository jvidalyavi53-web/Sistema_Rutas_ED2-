<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Rutas{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
</head>
<body>
    <!-- Sprite de iconos SVG reutilizables -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <defs>
            <g id="ic-plus"><path d="M12 5v14M5 12h14"/></g>
            <g id="ic-grid"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></g>
            <g id="ic-refresh"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v5h-5"/></g>
            <g id="ic-route"><circle cx="6" cy="19" r="2.5"/><circle cx="18" cy="5" r="2.5"/><path d="M9 19h6a4 4 0 0 0 0-8H9a4 4 0 0 1 0-8h6"/></g>
            <g id="ic-compare"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="7" rx="1"/><rect x="12" y="6" width="3" height="12" rx="1"/><rect x="17" y="13" width="3" height="5" rx="1"/></g>
            <g id="ic-list"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></g>
            <g id="ic-trash"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></g>
            <g id="ic-pin"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></g>
            <g id="ic-road"><path d="M5 19 8 5M19 19 16 5M12 5v2M12 11v2M12 17v2"/></g>
            <g id="ic-back"><path d="M19 12H5M12 19l-7-7 7-7"/></g>
            <g id="ic-info"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></g>
            <g id="ic-map"><path d="m3 6 6-3 6 3 6-3v15l-6 3-6-3-6 3z"/><path d="M9 3v15M15 6v15"/></g>
        </defs>
    </svg>

    <header class="topbar">
        <a class="brand" href="{{ url_for('main.index') }}">
            <span class="brand-mark"><svg class="ic"><use href="#ic-route"/></svg></span>
            <span class="brand-text">Sistema de Rutas<small>Grafos · ED2</small></span>
        </a>
        <nav class="topbar-actions">
            {% block topbar_actions %}{% endblock %}
        </nav>
    </header>

    <main class="shell">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
